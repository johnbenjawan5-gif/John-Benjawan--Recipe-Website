<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Contact Us - Recipe Website</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background-color: #f5f5f5;
      margin: 0;
    }

    .home-btn {
  display: inline-block;
  margin-bottom: 20px;
  padding: 12px 16px;
  background-color: #070706;
  color: white;
  text-decoration: none;
  border-radius: 50%;
  font-size: 22px;
  transition: 0.3s;
}

.home-btn:hover {
  background-color: #0a0a0a;
  box-shadow: 0 0 15px #000000;
  transform: scale(1.1);
}

    .contact-container {
      max-width: 800px;
      background: #fff;
      margin: 50px auto;
      padding: 30px;
      border-radius: 10px;
      box-shadow: 0 0 10px rgba(0,0,0,0.1);
    }

    h1 {
      text-align: center;
      color: #ff7043;
    }

    .contact-info {
      text-align: center;
      margin-bottom: 20px;
      color: #555;
    }

    form {
      display: flex;
      flex-direction: column;
    }

    input, textarea {
      margin: 10px 0;
      padding: 12px;
      border-radius: 5px;
      border: 1px solid #ccc;
      font-size: 16px;
    }

    textarea {
      resize: none;
      height: 120px;
    }

    button {
      background-color: #ff7043;
      color: white;
      padding: 12px;
      border: none;
      border-radius: 5px;
      font-size: 18px;
      cursor: pointer;
      transition: 0.3s;
    }

    button:hover {
      background-color: #070706;
      box-shadow: 0 0 10px #030303;
    }
  </style>
</head>
<body>

<a href="index.html" class="home-btn">⬅</a>

<div class="contact-container">
  <h1>Contact Us</h1>

  <div class="contact-info">
    <p>Email: Yummyrecipes@email.com</p>
    <p>Phone: +63 9629641331</p>
  </div>

  <form>
    <input type="text" placeholder="Your Name" required>

    <input type="email" placeholder="Your Email" required>

    <textarea placeholder="Your Message" required></textarea>

    <button type="submit">Send Message</button>
  </form>

</div>

</body>
</html>
